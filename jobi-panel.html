<title>Jobi — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<style>
/* Jobi chat — self-contained portfolio simulation embedded as the canvas
   sidebar. No backend, no dependencies. Auto-plays a scripted conversation:
   a user request is typed, sent, Jobi "thinks", then streams a reply. */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #171717;
  --bg2:       #1F1F1F;
  --bg3:       #262626;
  --bg4:       #2D2D2D;
  --border:    #3E3E3E;
  --border2:   #4a4a4a;
  --text:      #F7F4F2;
  --text2:     #B5AEA8;
  --text3:     #8A8480;
  --accent:    #F29FA0;
  --accent-press: #E58E8F;
  --user-bubble: #F29FA0;
  --user-text: #171717;
  --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
}

html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* Panel fills the embedding frame */
.panel {
  width: 100%; height: 100vh;
  background: var(--bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Minimal icon nav (decorative) */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 6px;
  flex-shrink: 0;
}
.header-left { display: flex; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: none; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .14s ease, color .14s ease;
}
.icon-btn:hover { background: rgba(255,255,255,0.05); color: var(--text2); }
.icon-btn.active { background: var(--bg2); color: var(--text); }
.icon-btn svg { width: 17px; height: 17px; }
.icon-btn.has-dot { position: relative; }
.icon-btn.has-dot::after {
  content: ""; position: absolute; top: 5px; right: 5px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); border: 1.5px solid var(--bg);
}

/* Chat view */
.chat-view { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

.chat-messages {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  padding: 12px 0 8px;
}
.chat-messages::-webkit-scrollbar { width: 0; }
.chat-messages.is-welcome { justify-content: center; }

.chat-suggest { flex-shrink: 0; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
.chat-suggest-label { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text3); padding: 10px 16px 0; }
.chat-chips-row { display: flex; gap: 7px; padding: 7px 16px 0; overflow-x: auto; }
.chat-chips-row::-webkit-scrollbar { display: none; }
.sugg-chip {
  flex-shrink: 0; padding: 8px 16px; border-radius: 18px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; cursor: pointer;
  transition: background .14s ease;
  animation: chipPop .42s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.sugg-chip:hover { background: rgba(255,255,255,0.10); }
@keyframes chipPop { 0%{opacity:0;transform:translateY(14px) scale(.92)} 100%{opacity:1;transform:translateY(0) scale(1)} }

/* Welcome (empty) state */
.welcome { display: flex; flex-direction: column; align-items: center; gap: 26px; padding: 0 24px; transition: opacity .4s ease; }
.welcome.hide { opacity: 0; pointer-events: none; }
.mascot { width: 116px; animation: float 5.5s ease-in-out infinite; }
.mascot svg { width: 100%; height: auto; display: block; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.welcome-greeting {
  font-family: var(--font-serif); font-size: 23px; line-height: 1.35;
  color: var(--text2); text-align: center; letter-spacing: -0.01em; font-weight: 500;
}
.welcome-greeting em { color: var(--text); font-style: normal; font-weight: 600; }

/* Messages */
.msg { display: flex; flex-direction: column; padding: 12px 16px 0; }
.msg.ai   { align-self: stretch; }
.msg.user { align-self: flex-end; max-width: 82%; }

.msg-bubble { font-size: 13.5px; line-height: 1.55; }
.msg.ai .msg-bubble { color: var(--text); }
.msg.user .msg-bubble {
  background: var(--user-bubble); color: var(--user-text);
  padding: 11px 15px; border-radius: 18px; border-bottom-right-radius: 5px;
}

.msg-bubble-fresh { animation: bubblePop .24s cubic-bezier(0.16,1,0.3,1) both; }
.msg.ai   .msg-bubble-fresh { transform-origin: bottom left;  }
.msg.user .msg-bubble-fresh { transform-origin: bottom right; }
@keyframes bubblePop { from{opacity:0;transform:scale(.88) translateY(4px)} to{opacity:1;transform:scale(1) translateY(0)} }

.md-p { margin: 0; line-height: 1.6; }
.md-p + .md-p, .md-p + .md-ul, .md-ul + .md-p { margin-top: 9px; }
.md-ul { list-style: none; margin: 4px 0 0; padding-left: 18px; }
.md-ul li { position: relative; line-height: 1.55; padding-left: 2px; margin: 3px 0; }
.md-ul li::before { content: ""; position: absolute; left: -12px; top: 0.62em; width: 4px; height: 4px; border-radius: 50%; background: var(--text3); }
.msg.ai strong { font-weight: 600; }
.msg.ai em { font-style: italic; }

.shimmer {
  font-family: var(--font-sans);
  background: linear-gradient(90deg, var(--text2) 0%, var(--text) 50%, var(--text2) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  animation: shimmer 2.4s linear infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Composer (the zero-JS-feel input pill) */
.composer { flex-shrink: 0; padding: 12px 16px 16px; background: var(--bg); }
.input-pill {
  display: flex; flex-wrap: wrap; align-items: flex-end;
  background: rgba(255,255,255,0.05); border: none;
  border-radius: 22px; padding: 6px; min-height: 92px;
  box-shadow: 0 1px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
  transition: background .14s ease;
}
.input-field {
  flex: 1 1 100%; order: -1; min-width: 0;
  background: transparent; border: none; outline: none; resize: none;
  font-family: var(--font-sans); font-size: 13.5px; color: var(--text);
  line-height: 1.45; padding: 12px 8px; field-sizing: content;
  max-height: 140px; overflow-y: auto;
}
.input-field::placeholder { color: var(--text3); }
.icon-row { display: flex; align-items: center; width: 100%; gap: 4px; }
.pill-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: none; color: var(--text3);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: color .14s ease, background .14s ease;
}
.pill-btn:hover { color: var(--text2); background: rgba(255,255,255,0.05); }
.pill-btn svg { width: 17px; height: 17px; }
.spacer { margin-left: auto; }
.mic-btn.listening { color: var(--accent); background: rgba(242,159,160,0.16); animation: micPulse 1.6s ease-in-out infinite; }
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(242,159,160,0.4)} 50%{box-shadow:0 0 0 6px rgba(242,159,160,0)} }
.send-btn {
  width: 34px; height: 34px; margin-left: 6px; padding: 0;
  background: var(--accent); color: #222222; border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  opacity: 0.35;
  transition: opacity .2s ease, background .14s ease, transform .15s var(--ease-out);
}
.input-pill.has-text .send-btn { opacity: 1; }
.send-btn:hover { background: var(--accent-press); }
.send-btn svg { width: 16px; height: 16px; }

@media (prefers-reduced-motion: reduce) {
  .mascot, .sugg-chip, .msg-bubble-fresh, .shimmer { animation: none !important; }
}
</style>

<script>
/* Streaming-safe, injection-safe markdown renderer */
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function renderInline(esc){
  let out = esc.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
  return out;
}
function renderMarkdown(raw){
  if(!raw) return '';
  const esc = escHtml(raw);
  const lines = esc.split('\n');
  const blocks = []; let para = [], bullets = [];
  const flushPara = ()=>{ if(para.length){ blocks.push('<p class="md-p">'+renderInline(para.join('<br>'))+'</p>'); para=[]; } };
  const flushBullets = ()=>{ if(bullets.length){ blocks.push('<ul class="md-ul">'+bullets.map(b=>'<li>'+renderInline(b)+'</li>').join('')+'</ul>'); bullets=[]; } };
  for(const line of lines){
    const t = line.trim();
    const bm = t.match(/^[-*]\s+(.*)$/);
    if(bm){ flushPara(); bullets.push(bm[1]); }
    else if(t===''){ flushPara(); flushBullets(); }
    else { flushBullets(); para.push(t); }
  }
  flushPara(); flushBullets();
  return blocks.join('');
}

const $ = id => document.getElementById(id);
const messages = $('messages'), welcome = $('welcome'), pill = $('pill'),
      input = $('input'), mic = $('mic'),
      suggest = $('suggest'), suggestRow = $('suggest-row');
const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const sleep = ms => new Promise(r => setTimeout(r, ms));
const scrollDown = () => { messages.scrollTop = messages.scrollHeight; };

let runToken = 0;
const cancelled = tok => tok !== runToken;

const SCRIPT = [
  {
    user: "Should I apply to this Product Designer role at Linear?",
    ai: "Honestly, strong fit. Your design-systems work and the fintech experience line up well with what they're after.\n\nOne real gap: they lean on native mobile, which isn't on your CV yet.\n\nWant me to tailor your CV to this one, or frame the adjacent experience?",
    chips: ["Tailor my CV", "Frame the experience"]
  },
  {
    user: "Tailor my CV, please",
    ai: "On it. I pulled the three experiences that map best to this role and rewrote the bullets to lead with impact.\n\n**Senior Product Designer, Monzo**\n- Built a design system used across 40+ screens\n- Cut onboarding drop-off by 18%\n\nWant a downloadable CV, or shall I draft the cover letter next?",
    chips: ["Download as CV", "Draft the cover letter"]
  }
];

async function typeInto(text, tok){
  pill.classList.add('has-text');
  input.value = '';
  for(let i=0;i<text.length;i++){
    if(cancelled(tok)) return;
    input.value = text.slice(0, i+1);
    await sleep(reduce ? 0 : 26 + Math.random()*34);
  }
}

function sendUser(text){
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = '<div class="msg-bubble msg-bubble-fresh">'+escHtml(text).replace(/\n/g,'<br>')+'</div>';
  messages.appendChild(wrap);
  input.value = '';
  pill.classList.remove('has-text');
  scrollDown();
}

function revealAi(el, full, tok){
  return new Promise(resolve => {
    if(reduce){ el.innerHTML = renderMarkdown(full); resolve(); return; }
    const parts = full.split(' ');
    const DUR = 4000;
    const easeOut = t => 1 - Math.pow(1 - t, 3);
    const start = performance.now();
    let last = -1;
    const step = now => {
      if(cancelled(tok)){ resolve(); return; }
      const t = Math.min((now - start) / DUR, 1);
      const cursor = Math.max(1, Math.floor(easeOut(t) * parts.length));
      if(cursor !== last){ last = cursor; el.innerHTML = renderMarkdown(parts.slice(0, cursor).join(' ')); scrollDown(); }
      if(t < 1) requestAnimationFrame(step);
      else { el.innerHTML = renderMarkdown(full); scrollDown(); resolve(); }
    };
    requestAnimationFrame(step);
  });
}

async function aiTurn(text, tok){
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<span class="shimmer">Thinking…</span>';
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  scrollDown();
  await sleep(reduce ? 200 : 1100);
  if(cancelled(tok)) return;
  await revealAi(bubble, text, tok);
}

function showSuggestions(chips){
  suggestRow.innerHTML = '';
  chips.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'sugg-chip'; b.tabIndex = -1; b.textContent = c;
    b.style.animationDelay = (i * 70) + 'ms';
    suggestRow.appendChild(b);
  });
  suggest.style.display = 'block';
}
function hideSuggestions(){ suggest.style.display = 'none'; suggestRow.innerHTML = ''; }

function reset(){
  messages.querySelectorAll('.msg').forEach(n => n.remove());
  hideSuggestions();
  messages.classList.add('is-welcome');
  welcome.style.display = '';
  welcome.classList.remove('hide');
  pill.classList.remove('has-text');
  input.value = '';
  mic.classList.remove('listening');
}

async function run(){
  const tok = ++runToken;
  reset();
  await sleep(reduce ? 300 : 1400);
  if(cancelled(tok)) return;

  for(let i=0;i<SCRIPT.length;i++){
    const turn = SCRIPT[i];

    await sleep(reduce ? 0 : 500);
    if(cancelled(tok)) return;

    await typeInto(turn.user, tok);
    if(cancelled(tok)) return;
    await sleep(reduce ? 0 : 380);
    if(cancelled(tok)) return;

    if(i === 0){
      welcome.classList.add('hide');
      await sleep(reduce ? 0 : 340);
      if(cancelled(tok)) return;
      welcome.style.display = 'none';
      messages.classList.remove('is-welcome');
    }
    hideSuggestions();
    sendUser(turn.user);
    await sleep(reduce ? 0 : 450);
    if(cancelled(tok)) return;

    await aiTurn(turn.ai, tok);
    if(cancelled(tok)) return;

    if(turn.chips) showSuggestions(turn.chips);

    await sleep(reduce ? 600 : 2800);
  }

  if(!reduce){
    await sleep(2200);
    if(cancelled(tok)) return;
    run();
  }
}

run();
</script>
</body>
</html>
