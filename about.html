<style>
* { box-sizing: border-box; }
body {
  margin: 0; height: 100vh; overflow: hidden;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  color: #1d1d1f; -webkit-font-smoothing: antialiased;
  /* full-screen cloudy sky */
  background:
    url("decor/clouds-full.svg") no-repeat center center / cover,
    radial-gradient(1200px 820px at 50% 48%, rgba(255,255,255,0.45) 0%, transparent 60%),
    linear-gradient(180deg, #eaf1fb 0%, #dde7f6 56%, #d6e2f4 100%);
}
/* grain film */
body::after {
  content: ""; position: fixed; inset: 0; z-index: 50; pointer-events: none;
  background: url("decor/grain.svg"); background-size: 200px 200px;
  opacity: 0.06; mix-blend-mode: multiply;
}

/* nav */
.pg-nav {
  position: fixed; top: 0; left: 0; right: 0; height: 72px; z-index: 20;
  display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
}
.pg-name { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: #1d1d1f; text-decoration: none; transition: transform 160ms cubic-bezier(0.23,1,0.32,1); }
.pg-name:active { transform: scale(0.96); }
.pg-links { display: flex; gap: 28px; }
.pg-links a { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; color: #6b7280; text-decoration: none; transition: color .25s ease, transform 160ms cubic-bezier(0.23,1,0.32,1); }
.pg-links a.is-on { color: #1d1d1f; }
@media (hover: hover) and (pointer: fine) { .pg-links a:hover { color: #1d1d1f; } }
.pg-links a:active { transform: scale(0.95); }

/* stage — one film, centred */
.ab-stage {
  height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 30px;
  padding: 96px 24px 44px;
}
.ab-film {
  width: min(940px, 82vw); aspect-ratio: 16 / 9; position: relative;
}
.ab-film video {
  width: 100%; height: 100%; object-fit: cover; display: block;
  opacity: 0.7; transition: opacity .5s ease;
  /* borders feather out into the sky — soft-edged rectangle:
     two linear masks intersected so every side fades evenly */
  -webkit-mask-image:
    linear-gradient(to right, transparent 0%, #000 17%, #000 83%, transparent 100%),
    linear-gradient(to bottom, transparent 0%, #000 15%, #000 85%, transparent 100%);
  -webkit-mask-composite: source-in;
  mask-image:
    linear-gradient(to right, transparent 0%, #000 17%, #000 83%, transparent 100%),
    linear-gradient(to bottom, transparent 0%, #000 15%, #000 85%, transparent 100%);
  mask-composite: intersect;
}
/* once playing, the film goes fully opaque; at rest the thumbnail stays translucent */
.ab-film video.is-playing { opacity: 1; }
/* glass cloud-mascot play button (silhouette only, frosted-glass fill) */
.ab-play {
  position: absolute; left: 50%; top: 50%;
  width: 150.0px; height: 112.42px;
  margin: 0; padding: 0; border: 0; background: none;
  transform: translate(-50%, -50%); transform-origin: center;
  cursor: pointer; z-index: 3;
  filter: drop-shadow(0 -1px 0.5px rgba(255, 255, 255, 0.5)) drop-shadow(0 14px 30px rgba(60, 58, 90, 0.34));
  transition: transform .3s cubic-bezier(.23,1,.32,1), opacity .35s ease;
}
.ab-play-cloud {
  position: absolute; inset: 0;
  clip-path: url(#abCloudClip);
  background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.5));
  -webkit-backdrop-filter: blur(16px) saturate(1.5);
  backdrop-filter: blur(16px) saturate(1.5);
}
.ab-play-tri {
  position: absolute; left: 52%; top: 50%; transform: translate(-50%, -50%);
  width: 0; height: 0; border-style: solid;
  border-width: 11px 0 11px 18px;
  border-color: transparent transparent transparent rgba(30, 30, 46, 0.7);
}
@media (hover: hover) and (pointer: fine) {
  .ab-play:hover { transform: translate(-50%, -50%) scale(1.06); }
}
.ab-play:active { transform: translate(-50%, -50%) scale(0.96); }
.ab-play.is-hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -50%) scale(0.82); }

/* quiet contact line */
.ab-say { display: flex; align-items: center; flex-wrap: wrap; justify-content: center; gap: 18px; font-size: 14.5px; }
.ab-say b { font-weight: 600; color: #1d1d1f; }
.ab-say a { color: #6b7280; text-decoration: none; transition: color .2s ease; }
@media (hover: hover) and (pointer: fine) { .ab-say a:hover { color: #1d1d1f; } }

/* entrance */
@media (prefers-reduced-motion: no-preference) {
  @keyframes abIn { from { opacity: 0; transform: translateY(14px) scale(0.985); } to { opacity: 1; transform: none; } }
  .ab-film { animation: abIn .8s cubic-bezier(0.23,1,0.32,1) both; }
  .ab-say { animation: abIn .8s cubic-bezier(0.23,1,0.32,1) .12s both; }
}

/* phones */
@media (max-width: 820px) {
  .pg-nav { padding: 0 20px; }
  .ab-stage { padding: 92px 18px 36px; gap: 24px; }
  .ab-film { width: 100%; }
  .pg-links { gap: 20px; }
  .pg-links a { font-size: 14px; }
}
</style>

  <script>
  (function () {
    var film = document.querySelector('.ab-film');
    if (!film) return;
    var v = film.querySelector('video');
    var btn = film.querySelector('.ab-play');
    if (!v || !btn) return;
    btn.addEventListener('click', function () {
      v.controls = true;
      v.classList.add('is-playing');
      btn.classList.add('is-hidden');
      var p = v.play();
      if (p && p.catch) p.catch(function () {});
    });
  }());
  </script>
