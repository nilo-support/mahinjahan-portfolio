<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="wisp" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <radialGradient id="puff" cx="50%" cy="62%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <g id="cloud" fill="url(#puff)">
      <ellipse cx="60"  cy="118" rx="74" ry="40"/>
      <ellipse cx="150" cy="92"  rx="88" ry="58"/>
      <ellipse cx="248" cy="104" rx="74" ry="50"/>
      <ellipse cx="206" cy="70"  rx="56" ry="44"/>
      <ellipse cx="320" cy="122" rx="60" ry="38"/>
      <rect x="6" y="120" width="372" height="34" rx="17"/>
    </g>
  </defs>
  <g filter="url(#soft)">
    <!-- top band -->
    <use href="#cloud" transform="translate(0,-10)    scale(1.05)" opacity="0.60"/>
    <use href="#cloud" transform="translate(430,-30)  scale(0.82)" opacity="0.48"/>
    <use href="#cloud" transform="translate(800,0)    scale(1.28)" opacity="0.62"/>
    <use href="#cloud" transform="translate(1200,-26) scale(0.80)" opacity="0.46"/>
    <!-- upper-mid, pushed to the sides (clearer centre for the video) -->
    <use href="#cloud" transform="translate(-120,250) scale(0.95)" opacity="0.42"/>
    <use href="#cloud" transform="translate(1140,300) scale(1.02)" opacity="0.44"/>
    <!-- lower-mid sides -->
    <use href="#cloud" transform="translate(-150,520) scale(0.9)"  opacity="0.40"/>
    <use href="#cloud" transform="translate(1170,540) scale(0.98)" opacity="0.42"/>
    <!-- bottom band -->
    <use href="#cloud" transform="translate(40,700)   scale(1.10)" opacity="0.58"/>
    <use href="#cloud" transform="translate(470,742)  scale(0.88)" opacity="0.46"/>
    <use href="#cloud" transform="translate(860,690)  scale(1.30)" opacity="0.60"/>
    <use href="#cloud" transform="translate(1240,748) scale(0.74)" opacity="0.44"/>
  </g>
  <g filter="url(#wisp)" fill="#ffffff">
    <ellipse cx="360" cy="190" rx="280" ry="12" opacity="0.20"/>
    <ellipse cx="1080" cy="250" rx="320" ry="13" opacity="0.18"/>
    <ellipse cx="260" cy="640" rx="260" ry="12" opacity="0.18"/>
    <ellipse cx="980" cy="660" rx="320" ry="13" opacity="0.18"/>
  </g>
</svg>
